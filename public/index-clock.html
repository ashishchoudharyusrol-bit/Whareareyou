<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Timezones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: #fff;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            animation: fadeIn 0.6s ease-in-out;
        }

        .clock-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .timezone-name {
            color: #fff;
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .time-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #00d4ff;
        }

        .digital-time {
            font-size: 2.5em;
            color: #00ff88;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            font-family: 'Courier New', monospace;
            line-height: 1.2;
        }

        .zone-code {
            color: #00d4ff;
            font-size: 0.85em;
            margin-top: 8px;
            opacity: 0.8;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .info-box {
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid #00ff88;
            padding: 15px 20px;
            border-radius: 8px;
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.95em;
        }

        .loading {
            text-align: center;
            color: #fff;
            font-size: 1.2em;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .time-offset {
            color: #ffa500;
            font-size: 0.85em;
            margin-top: 5px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .digital-time {
                font-size: 2em;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }
        }

        .last-updated {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 Global Digital Clock</h1>
            <p>Current time across major world timezones</p>
        </div>

        <div class="info-box">
            ⏰ Times update every second • Click refresh to update manually
        </div>

        <div class="controls">
            <button class="btn" onclick="updateClocks()">🔄 Refresh Now</button>
            <button class="btn" onclick="toggleAutoUpdate()">⏸️ <span id="toggleBtn">Pause</span> Auto-update</button>
        </div>

        <div id="clocksContainer" class="clocks-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading timezones...</p>
            </div>
        </div>

        <div class="last-updated" id="lastUpdated"></div>
    </div>

    <script>
        let autoUpdateEnabled = true;
        let updateInterval;

        async function updateClocks() {
            try {
                const response = await fetch('/api/time');
                const times = await response.json();
                
                const container = document.getElementById('clocksContainer');
                container.innerHTML = '';

                times.forEach((clock, index) => {
                    const card = document.createElement('div');
                    card.className = 'clock-card';
                    card.style.animationDelay = `${index * 0.1}s`;
                    
                    const [time, period] = clock.time.split(' ');
                    const [hours, minutes, seconds] = time.split(':');
                    
                    card.innerHTML = `
                        <div class="timezone-name">${clock.name}</div>
                        <div class="time-display">
                            <div class="digital-time">${hours}:${minutes}<span style="font-size: 0.6em;">:${seconds}</span></div>
                            <div class="zone-code">${period || ''}</div>
                        </div>
                    `;
                    
                    container.appendChild(card);
                });

                updateLastUpdatedTime();
            } catch (error) {
                console.error('Error fetching time:', error);
                document.getElementById('clocksContainer').innerHTML = '<p>Error loading clocks</p>';
            }
        }

        function updateLastUpdatedTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            });
            document.getElementById('lastUpdated').textContent = `Last updated: ${timeStr} (Your Local Time)`;
        }

        function toggleAutoUpdate() {
            autoUpdateEnabled = !autoUpdateEnabled;
            const btn = document.getElementById('toggleBtn');
            
            if (autoUpdateEnabled) {
                btn.textContent = 'Pause';
                startAutoUpdate();
            } else {
                btn.textContent = 'Resume';
                clearInterval(updateInterval);
            }
        }

        function startAutoUpdate() {
            updateClocks();
            updateInterval = setInterval(updateClocks, 1000);
        }

        // Initial load
        window.addEventListener('load', () => {
            startAutoUpdate();
        });

        // Stop updating when page is hidden
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                clearInterval(updateInterval);
            } else if (autoUpdateEnabled) {
                startAutoUpdate();
            }
        });

        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            clearInterval(updateInterval);
        });
    </script>
</body>
</html>
